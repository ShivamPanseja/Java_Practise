<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookFlow</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="page-bg">
        <div class="page-container">
            <section id="auth-screen" class="auth-screen">
                <div class="auth-panel card">
                    <div class="brand-row">
                        <div class="brand-mark">B</div>
                        <div>
                            <h1>BookFlow</h1>
                            <p>Login to manage books, or register a new account in seconds.</p>
                        </div>
                    </div>

                    <div class="tab-buttons">
                        <button class="tab-btn active" data-tab="login">Login</button>
                        <button class="tab-btn" data-tab="register">Register</button>
                    </div>

                    <div id="login-panel" class="tab-panel active">
                        <form id="login-form">
                            <div class="form-group">
                                <label for="login-email">Email</label>
                                <input type="email" id="login-email" placeholder="you@example.com" required />
                            </div>
                            <div class="form-group">
                                <label for="login-password">Password</label>
                                <input type="password" id="login-password" placeholder="Enter password" required />
                            </div>
                            <button type="submit">Sign In</button>
                        </form>
                    </div>

                    <div id="register-panel" class="tab-panel">
                        <form id="register-form">
                            <div class="form-group">
                                <label for="register-firstName">First name</label>
                                <input type="text" id="register-firstName" placeholder="First name" />
                            </div>
                            <div class="form-group">
                                <label for="register-lastName">Last name</label>
                                <input type="text" id="register-lastName" placeholder="Last name" />
                            </div>
                            <div class="form-group">
                                <label for="register-email">Email</label>
                                <input type="email" id="register-email" placeholder="you@example.com" required />
                            </div>
                            <div class="form-group">
                                <label for="register-password">Password</label>
                                <input type="password" id="register-password" placeholder="Choose a strong password" required />
                            </div>
                            <button type="submit">Create Account</button>
                        </form>
                    </div>

                    <div id="auth-message" class="auth-message"></div>
                </div>
            </section>

            <section id="app-screen" class="app-screen hidden">
                <header class="app-header card">
                    <div>
                        <h1>Book Dashboard</h1>
                        <p id="login-status">Not logged in.</p>
                    </div>
                    <button id="logout-button" class="secondary">Logout</button>
                </header>

                <section class="card book-card">
                    <div class="book-card-header">
                        <div>
                            <h2>Book Collection</h2>
                            <p>Manage books once you're signed in.</p>
                        </div>
                        <button id="refresh-books">Refresh list</button>
                    </div>

                    <div class="book-actions">
                        <div class="inline-form">
                            <input type="number" id="book-id-search" placeholder="Book ID" />
                            <button id="search-book">Search</button>
                        </div>
                    </div>

                    <div class="book-form-grid">
                        <form id="book-form">
                            <div class="form-group small">
                                <label for="book-id">Book ID (update/delete)</label>
                                <input type="number" id="book-id" placeholder="Book ID" />
                            </div>
                            <div class="form-group">
                                <label for="book-title">Title</label>
                                <input type="text" id="book-title" placeholder="Book title" required />
                            </div>
                            <div class="form-group">
                                <label for="book-author">Author</label>
                                <input type="text" id="book-author" placeholder="Author name" required />
                            </div>
                            <div class="form-group">
                                <label for="book-genre">Genre</label>
                                <input type="text" id="book-genre" placeholder="Genre" required />
                            </div>
                            <div class="button-row">
                                <button type="submit">Add Book</button>
                                <button id="update-book" type="button" class="secondary">Update</button>
                                <button id="delete-book" type="button" class="secondary danger">Delete</button>
                            </div>
                        </form>
                    </div>

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Author</th>
                                    <th>Genre</th>
                                    <th>Created</th>
                                    <th>Updated</th>
                                </tr>
                            </thead>
                            <tbody id="books-table-body"></tbody>
                        </table>
                    </div>
                </section>

                <section class="card message-card">
                    <h2>Status</h2>
                    <div id="message"></div>
                </section>
            </section>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
